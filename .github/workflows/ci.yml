name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke checks
        run: npm run smoke

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        run: xvfb-run -a npm run docs:build

  e2e-test:
    name: E2E Test
    runs-on: ${{ vars.E2E_RUNNER != '' && vars.E2E_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      PLAYWRIGHT_WORKERS: ${{ vars.E2E_PLAYWRIGHT_WORKERS != '' && vars.E2E_PLAYWRIGHT_WORKERS || '1' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run end-to-end tests
        run: xvfb-run -a npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
