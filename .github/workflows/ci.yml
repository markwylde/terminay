name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke checks
        run: npm run smoke

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        run: xvfb-run -a npm run docs:build

  e2e-test:
    name: E2E Test
    runs-on: ${{ vars.E2E_RUNNER != '' && vars.E2E_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 25
    env:
      PLAYWRIGHT_WORKERS: ${{ vars.E2E_PLAYWRIGHT_WORKERS != '' && vars.E2E_PLAYWRIGHT_WORKERS || '1' }}
      TERMIDE_CODEX_TEST_MODEL: ${{ vars.TERMIDE_CODEX_TEST_MODEL != '' && vars.TERMIDE_CODEX_TEST_MODEL || 'openai/gpt-5.1-codex-mini' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run end-to-end tests
        run: xvfb-run -a npm run test:e2e

      - name: Run AI tab metadata tests with real Codex
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TERMIDE_TEST_USE_REAL_CODEX: '1'
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY is not set; skipping real Codex smoke test."
            exit 0
          fi

          export CODEX_HOME="$RUNNER_TEMP/codex"
          npm install -g @openai/codex
          node scripts/setup-codex-openrouter.mjs
          xvfb-run -a npm run test:e2e:ai-real

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
